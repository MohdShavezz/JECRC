<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
        .parent > div{
            background-color: rgb(0, 255, 166);
            width: 50px;
            height: 50px;
            margin: 10px;
        }
        .parent{
            background-color: beige;
            width: 100%;
            display: flex;
            flex-direction: row-reverse;
            /* flex-direction: column-reverse; */
            gap: 3rem;
            /* flex-wrap: wrap-reverse; */
        }
        /* center the content important  */
        #six{
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>
    <h2>Flex Model</h2>
    <div class="parent">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div id="six">6</div>
    </div>
</body>
</html>
