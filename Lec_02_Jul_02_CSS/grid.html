<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .parent > div{
            background-color: rgb(0, 255, 166);
            width: 50px;
            height: 50px;
            margin: 10px;
        }
        .parent{
            background-color: beige;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
        }
        @media screen and (max-width: 678px){
            .parent{
                background-color: pink;
                grid-template-columns: 1fr 1fr;
            }
        }
        @media screen and (max-width: 576px ){
            .parent{
                background-color: rgb(192, 255, 196);
                grid-template-columns: 1fr;
            }
        }



        section{
            background-color: rgb(184, 234, 122);
            width: 100%;
        }
        .main{
            display: grid;
            grid-template-columns: 1fr 3fr;
        }
        .main .left, .main .right{
            background-color: #769cda;
            height:2rem;
            border: 1px solid white;
            padding: 10px;
        }

   "header
   left right
   footer
   "






    </style>
</head>
<body>
    <h2>Grid Model</h2>
     <div class="parent">
        <div>1</div>
        <div>2</div>
        <div>3</div>
        <div>4</div>
        <div>5</div>
        <div>6</div>
    </div>

    <h2>EXAMPLE</h2>
    <section>
        <header>
            <h3> Header</h3>
        </header>
        <div class="main">
            <div class="left">left</div>
            <div class="right">right</div>
        </div>
        <footer>
            <h3> Footer</h3>
        </footer>
    </section>
</body>
</html>
