<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Lecture</title>
    <style>
        :root {
            --my_red: rgb(206, 71, 247);
        }

        #list {
            background: yellow;
            list-style: none;
            /* opacity: .5; */
        }

        /* #list{
            display: none; 
        } */

        /* p:nth-child(3) {
            color: red;
        } */
        /* div > p{
            color: rgb(0, 255, 166);
         } */
        /* #two + p{
            color: rgb(0, 255, 166);
         } */
        #one~p {
            color: rgb(0, 255, 166);
        }

        /* #name{
            background-color: rgb(0, 255, 166);
            padding-left: 30px;
         } */
        /* input[type="text"] {
            font-size: 20px;
        } */
        .square {
            width: 120px;
            height: 120px;
            background-color: rgb(0, 255, 166);
        }

        .square:hover {
            background-color: var(--my_red);
            transition: 1s;
            /* transform: rotate(360deg);
            transform: translateY(300px); */
            box-shadow: 10px 10px 5px rgb(0, 0, 0);
        }

        input[type="text"]:focus {
            background-color: pink;
        }

        #last p:first-child {
            color:  var(--my_red);
        }

        #last p:last-child {
            color: violet;
        }

        #last p:nth-child(2) {
            color: blue;
        }

        #hello::first-letter {
            color:  var(--my_red);
            font-weight: bold;
            text-transform: uppercase;
        }

        #hello::after {
            content: "❤️";
            /* color: blue; */
        }

        .parent {
            position: relative;
        }

        .child {
            position: absolute;
            top: 50%;
            left: 50%;
            /* bottom: 0; left: 0; */
            /* calc(100vh - 5rem); */

        }
    </style>

</head>

<body>
    <h2>CSS Lecture</h2>
    <div style="border:1px solid black;">
        <p id="one">one</p>
        <p id="two">two</p>
        <p id="three">three</p>
    </div>

    <br>
    <form>
        <input id="name" type="text" name="name" id="name" placeholder="Enter your name">
    </form>
    <hr>
    <br>
    <h2>Pseudo Class</h2>
    <div class="square">
        this is a square
    </div>

    <hr>
    <div id="last" style="border:1px solid black;">
        <p>one</p>
        <p>two</p>
        <p>three</p>
    </div>

    <br>

    <h2>Pseudo elements</h2>
    <p id="hello">hello there!</p>

    <br>

    <ul id="list">
        <li>one</li>
        <li>banana</li>
        <li>orange</li>
        <li>mango</li>
    </ul>

    <span>this is inline element</span>

    <br>
    <br>
    <hr>
    <h2>POSTION TEST</h2>

    <div class="parent" style="width: 100%;height:20rem; background: pink;">
        <div class="child" style="width:5rem;height:5rem; background: yellow;">
            CHILD
        </div>
    </div>

    <br>
    <br>

</body>

</html>
