<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        section{
            width: 100%;
            background-color: rgb(178, 137, 216);
            border: 1px solid black;
            border-radius: 1rem;
            display: flex;
            flex-direction: column;
            padding: 2rem;
            justify-content: center;
            align-items: center;
            gap: 1rem;
        }
        section .box{
            width: 5rem;
            height: 5rem;
            border-radius: .5rem;
            border: 1px solid;
            background-color: rgb(233, 233, 233);
        }
        .btn-div button{
            padding: 3px 10px;
            border-radius: .5rem;
            background-color: rgb(228, 235, 229);
        }
        #user-color{
            border-radius: .5rem;
            padding: 3px 10px;

        }
    </style>
</head>
<body>
    <h1 style="text-align: center;">BG Changer</h1>
    <section>
        <div class="box" id="taget-box">

        </div>
        <div class="btn-div">
            <button onclick="changeColor('blue')">Blue</button>
            <button onclick="changeColor('red')">Red</button>
            <button onclick="changeColor('green')">Green</button>
        </div>
        <input type="text" placeholder="select color" name="" id="user-color">
        <button id="apply">Apply</button>
    </section>

    <script>
        function changeColor(clr){
            console.log(clr)
            let box=document.querySelector('#taget-box')
            box.style.background=clr
        }
        document.getElementById('apply').addEventListener('click',()=>{
            let userColor=document.getElementById('user-color').value
            changeColor(userColor)
        })
    </script>
</body>
</html>
